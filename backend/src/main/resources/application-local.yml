spring:
  datasource:
    url: jdbc:postgresql://localhost:5435/platform_db
    username: platform
    password: platform

  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

management:
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    enabled: true

logging:
  level:
    io.chicaodw.platform: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.flywaydb: DEBUG
