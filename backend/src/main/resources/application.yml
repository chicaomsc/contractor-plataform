spring:
  application:
    name: platform-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/platform_db}
    username: ${DB_USERNAME:platform}
    password: ${DB_PASSWORD:platform}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  mvc:
    problemdetails:
      enabled: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-at-least-32-chars-change-in-prod!}
    access-token-ttl: 900       # 15 minutes (seconds)
    refresh-token-ttl: 2592000  # 30 days (seconds)
  storage:
    base-path: ${STORAGE_PATH:./storage}

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
  show-actuator: false

info:
  app:
    name: ${spring.application.name}
    version: '@project.version@'
